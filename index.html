<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Lookup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-6">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        
        <div class="bg-gray-50 border-b border-gray-100 px-6 py-5 text-center">
            <h1 class="text-xl font-bold text-gray-800">Number Lookup Pro</h1>
            <p class="text-sm text-gray-500 mt-1">Direct API Connection</p>
        </div>

        <div class="p-6">
            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-700 mb-2">Mobile Number</label>
                <input type="text" id="phoneInput" 
                    placeholder="+91 90000 00000" 
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow text-gray-900 text-lg">
            </div>

            <button onclick="fetchData()" id="searchBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 rounded-lg transition-colors flex items-center justify-center gap-2">
                <span id="btnText">Search Number</span>
                <div id="btnSpinner" class="loader hidden"></div>
            </button>

            <div id="errorMsg" class="hidden mt-4 p-4 bg-red-50 border border-red-100 rounded-lg text-red-600 text-sm fade-in"></div>

            <div id="resultCard" class="hidden mt-6 border border-gray-200 rounded-xl overflow-hidden fade-in">
                <div class="bg-gray-50 px-4 py-3 border-b border-gray-200 flex justify-between items-center">
                    <span class="text-xs font-bold text-gray-500 uppercase tracking-wide">Record Found</span>
                    <span id="resMobile" class="text-sm font-semibold text-blue-600 bg-blue-50 px-2 py-1 rounded"></span>
                </div>
                <div class="p-4 space-y-4">
                    <div>
                        <p class="text-xs text-gray-500 mb-1">Full Name</p>
                        <p id="resName" class="font-semibold text-gray-900 text-lg"></p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <p class="text-xs text-gray-500 mb-1">Father's Name</p>
                            <p id="resFather" class="font-medium text-gray-800"></p>
                        </div>
                        <div>
                            <p class="text-xs text-gray-500 mb-1">Circle</p>
                            <p id="resCircle" class="font-medium text-gray-800"></p>
                        </div>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 mb-1">Address</p>
                        <p id="resAddress" class="text-sm text-gray-700 leading-relaxed bg-gray-50 p-3 rounded-lg border border-gray-100"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('phoneInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') fetchData();
        });

        async function fetchData() {
            const inputField = document.getElementById('phoneInput');
            const searchBtn = document.getElementById('searchBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const resultCard = document.getElementById('resultCard');
            const errorMsg = document.getElementById('errorMsg');

            // Clean number
            let cleaned = inputField.value.replace(/\D/g, '');
            if (cleaned.length === 12 && cleaned.startsWith('91')) cleaned = cleaned.substring(2);
            else if (cleaned.length > 10) cleaned = cleaned.slice(-10);

            if (cleaned.length !== 10) {
                showError("Please enter a valid 10-digit mobile number.");
                return;
            }

            // Reset UI
            errorMsg.classList.add('hidden');
            resultCard.classList.add('hidden');
            searchBtn.disabled = true;
            searchBtn.classList.add('opacity-80', 'cursor-not-allowed');
            btnText.innerText = 'Searching...';
            btnSpinner.classList.remove('hidden');

            try {
                // Because the API and HTML are on the exact same server now, 
                // we can just use a relative path. Bye-bye CORS!
                const response = await fetch(`/api/lookup?number=${cleaned}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "Failed to fetch data.");
                }

                if (data && data.result && data.result.length > 0) {
                    const person = data.result[0];
                    document.getElementById('resName').innerText = person.name || 'Not Available';
                    document.getElementById('resFather').innerText = person.father_name || 'Not Available';
                    document.getElementById('resCircle').innerText = person.circle || 'N/A';
                    document.getElementById('resAddress').innerText = person.address || 'Address not listed';
                    document.getElementById('resMobile').innerText = cleaned;
                    
                    resultCard.classList.remove('hidden');
                } else {
                    showError(`No records found for ${cleaned}.`);
                }
            } catch (error) {
                showError(error.message);
            } finally {
                searchBtn.disabled = false;
                searchBtn.classList.remove('opacity-80', 'cursor-not-allowed');
                btnText.innerText = 'Search Number';
                btnSpinner.classList.add('hidden');
            }
        }

        function showError(message) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.innerText = message;
            errorMsg.classList.remove('hidden');
        }
    </script>
</body>
</html>
